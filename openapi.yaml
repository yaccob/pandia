openapi: 3.0.3
info:
  title: pandia API
  description: |
    HTTP API for rendering Markdown with embedded diagrams to HTML or PDF.

    **`POST /render`** accepts raw Markdown as the request body and returns
    the rendered document directly. All diagram images are inlined (self-contained
    HTML). Output format, math rendering, and other options are controlled via
    query parameters.
  version: 1.7.0
  license:
    name: MIT

servers:
  - url: http://localhost:3300
    description: Default local server

paths:
  /health:
    get:
      summary: Health check
      operationId: health
      responses:
        '200':
          description: Server is healthy
          content:
            text/plain:
              schema:
                type: string
                enum: [ok]

  /render:
    post:
      summary: Render Markdown to HTML or PDF
      description: |
        Accepts raw Markdown as the request body and returns the rendered
        document directly as the response body. HTML output is self-contained
        with all images inlined as SVG. PDF output is returned as binary.
      operationId: render
      parameters:
        - name: format
          in: query
          required: false
          description: Output format
          schema:
            type: string
            enum: [html, pdf]
            default: html
        - name: math
          in: query
          required: false
          description: |
            Math rendering engine. `mathjax` embeds MathJax JavaScript
            (requires browser/CDN). `mathml` renders math as MathML
            (no JavaScript needed, works in VS Code webviews).
          schema:
            type: string
            enum: [mathjax, mathml]
            default: mathjax
        - name: maxwidth
          in: query
          required: false
          description: Maximum content width for HTML output
          schema:
            type: string
            default: 60em
        - name: center_math
          in: query
          required: false
          description: Center display math (default is left-aligned)
          schema:
            type: string
            enum: ['true', 'false']
            default: 'false'
        - name: kroki_server
          in: query
          required: false
          description: |
            Kroki server URL for rendering additional diagram types
            (BPMN, ERD, Pikchr, etc.)
          schema:
            type: string
          example: https://kroki.io
      requestBody:
        required: true
        description: Raw Markdown content
        content:
          text/plain:
            schema:
              type: string
            example: |
              # Hello

              ```graphviz
              digraph { A -> B; }
              ```

              Inline math: $e^{i\pi}+1=0$
      responses:
        '200':
          description: Rendered document
          content:
            text/html:
              schema:
                type: string
              example: '<html>...</html>'
            application/pdf:
              schema:
                type: string
                format: binary
        '400':
          description: Missing/empty body or invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed (use POST)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Rendering failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message
          example: "Empty request body — send Markdown as plain text"
